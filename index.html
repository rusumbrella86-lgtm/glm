<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find GLM</title>
    <style>
        body {
            margin: 0;
            padding: 40px 20px;
            background-color: #f5f5f5;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }
        h1 {
            font-size: 4em;
            color: #00aa55;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 40px;
        }
        .click-image {
            max-width: 85%;
            height: auto;
            border: 8px solid #00aa55;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .click-image:hover {
            transform: scale(1.02);
        }
        .footer {
            margin-top: 60px;
            font-size: 1em;
            color: #888;
        }
    </style>
</head>
<body>

    <h1>Find GLM</h1>
    <p>Click the picture below to go straight to her latest YouTube videos!</p>

    <a href="https://www.youtube.com/@GLM2026" target="_blank">
        <img src="image-20.jpg" alt="Click here to watch GLM on YouTube" class="click-image">
    </a>

    <a href="https://www.youtube.com/@420Flexaronnie" target="_blank">
        <img src="32.jpg" alt="Click here to watch GLM on YouTube" class="click-image">
    </a>

    <div class="footer">
        <p>Super simple. Made for finding GLM easy.</p>
    </div>

</body>
</html>
