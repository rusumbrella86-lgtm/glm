<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The Lounge - Find - GLM & INWO</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow-x: hidden;
    }

    body {
      background: #0a0a0a;
      color: #00ff9f;
      font-family: 'Press Start 2P', 'Courier New', monospace;
      line-height: 1.4;
      max-width: 1100px;
      margin-left: auto;
      margin-right: auto;
      padding: 15px;
      position: relative;
    }

    /* Extra visibility for matrix rain */
    .section, h1, p, .visitors, .footer-note {
      text-shadow: 0 0 3px rgba(0,0,0,0.6);
    }

    #matrix-bg {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -2;
      width: 100%;
      height: 100%;
      opacity: 0.38;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      background: rgba(10, 10, 10, 0.55);
      border-radius: 4px;
      padding: 15px;
      box-sizing: border-box;
    }

    h1, h2 {
      color: #00ffff;
      text-shadow: 0 0 10px #00ffff;
    }

    h1 {
      font-size: 1.4rem;
      text-shadow: 0 0 12px #00ffff, 0 0 4px #00ff9f;
    }

    a {
      color: #ffcc00;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }

    .section {
      margin-bottom: 28px;
    }

    .yt-links {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .yt-block {
      text-align: center;
      max-width: 180px;
      flex: 1 1 160px;
    }
    .yt-block img {
      border: 2px solid #333;
      max-width: 100%;
      height: auto;
      display: block;
    }

    .visitors {
      font-size: 14px;
      color: #ff8800;
      margin: 12px 0;
      text-align: center;
    }

    /* Illuminati Cards */
    .cards-panel {
      background: rgba(17, 17, 17, 0.65);
      border: 4px solid #00ff9f;
      padding: 12px;
      box-shadow: 0 0 25px rgba(0, 255, 159, 0.25);
    }

    .cards-toolbar {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: stretch;
      margin-bottom: 12px;
    }

    #card-search {
      font-family: 'Press Start 2P', monospace;
      background: #000;
      color: #00ff9f;
      border: 2px solid #00ff9f;
      padding: 10px;
      font-size: 12px;
      width: 100%;
      box-sizing: border-box;
    }

    #card-stats {
      font-size: 10px;
      color: #ffcc00;
      text-align: center;
    }

    .set-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .set-tab {
      font-size: 9px;
      padding: 8px 12px;
      flex: 1;
      min-width: 60px;
      text-align: center;
    }
    .set-tab.active {
      background: #00ff9f;
      color: #000;
    }

    .cards-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 14px;
      font-size: 10px;
      align-items: center;
    }

    .cards-filters label {
      color: #00ffff;
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 36px;
    }

    .cards-filters select {
      font-family: 'Press Start 2P', monospace;
      background: #000;
      color: #00ff9f;
      border: 2px solid #333;
      padding: 8px 10px;
      font-size: 9px;
    }

    .cards-filters input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin: 0;
    }

    .notable-cards h3 {
      font-size: 11px;
      color: #ffcc00;
      margin: 0 0 8px;
    }

    .notable-intro {
      font-size: 9px;
      color: #888;
      margin: 0 0 10px;
      line-height: 1.6;
    }

    .notable-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 12px;
      margin-bottom: 16px;
      -webkit-overflow-scrolling: touch;
    }

    .notable-card {
      flex: 0 0 130px;
      background: #111;
      border: 2px solid #ffcc00;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .notable-card:hover {
      transform: translateY(-2px);
      border-color: #00ffff;
    }

    .notable-card img {
      width: 100%;
      height: auto;
      max-height: 180px;
      object-fit: cover;
      display: block;
      image-rendering: auto;
    }

    .notable-card-body {
      padding: 6px;
      font-size: 7px;
      color: #00ff9f;
    }
    .notable-card-body strong {
      display: block;
      color: #ffcc00;
      margin-bottom: 4px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
      max-height: 520px;
      overflow-y: auto;
      padding-right: 4px;
      -webkit-overflow-scrolling: touch;
    }

    .grid-card {
      background: #111;
      border: 2px solid #333;
      cursor: pointer;
      position: relative;
      transition: border-color 0.1s;
    }
    .grid-card:hover {
      border-color: #00ff9f;
    }

    .grid-card img {
      width: 100%;
      height: auto;
      max-height: 180px;
      object-fit: cover;
      display: block;
    }

    .grid-card-info {
      padding: 6px;
      font-size: 7px;
      color: #888;
    }
    .grid-card-info strong {
      display: block;
      color: #00ffff;
      margin-bottom: 3px;
      font-size: 7px;
      line-height: 1.4;
    }

    .notable-badge {
      position: absolute;
      top: 4px;
      right: 4px;
      background: #ffcc00;
      color: #000;
      font-size: 6px;
      padding: 2px 4px;
    }

    .cards-loading, .cards-error {
      font-size: 10px;
      color: #ff8800;
      padding: 20px;
      text-align: center;
    }

    .detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      box-sizing: border-box;
    }

    .detail-panel {
      background: #111;
      border: 4px solid #00ff9f;
      max-width: 95%;
      max-height: 92vh;
      overflow-y: auto;
      width: 100%;
      margin: 10px;
      position: relative;
      box-shadow: 0 0 40px rgba(0, 255, 159, 0.3);
      -webkit-overflow-scrolling: touch;
    }

    .detail-close {
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 14px;
      z-index: 2;
      min-width: 36px;
      min-height: 36px;
    }

    .detail-image img {
      width: 100%;
      max-height: 360px;
      object-fit: contain;
      background: #000;
      display: block;
    }

    .detail-body {
      padding: 14px;
      font-size: 9px;
    }
    .detail-body h2 {
      font-size: 12px;
      margin: 0 0 10px;
    }

    .card-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }
    .card-badge {
      background: #222;
      border: 1px solid #00ff9f;
      padding: 3px 6px;
      font-size: 7px;
      color: #00ff9f;
    }

    .card-text {
      color: #ccc;
      line-height: 1.7;
      margin: 10px 0;
    }

    .notable-context {
      border-top: 2px solid #ffcc00;
      padding-top: 10px;
      margin-top: 10px;
      color: #ffcc00;
    }
    .notable-context h3 {
      font-size: 10px;
      margin: 0 0 6px;
    }

    button {
      font-family: 'Press Start 2P', monospace;
      background: #111;
      color: #00ff9f;
      border: 2px solid #00ff9f;
      padding: 8px 14px;
      font-size: 11px;
      cursor: pointer;
      margin-right: 6px;
    }
    button:hover {
      background: #00ff9f;
      color: #000;
    }

    .old-school {
      font-size: 10px;
      color: #666;
      margin-bottom: 10px;
    }

    .footer-note {
      font-size: 9px;
      color: #444;
      text-align: center;
      margin-top: 20px;
    }

    @media (min-width: 768px) {
      body { padding: 20px; }
      .cards-toolbar {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
      }
      #card-search {
        flex: 1;
        min-width: 280px;
        width: auto;
      }
      #card-stats { text-align: right; }
      .yt-links { justify-content: flex-start; }
      .detail-panel {
        max-width: 700px;
        max-height: 90vh;
      }
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.1rem; }
      .card-grid {
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      }
      .notable-card {
        flex: 0 0 110px;
      }
    }
  </style>
</head>
<body>
  <!-- Matrix Background Canvas -->
  <canvas id="matrix-bg"></canvas>

  <div class="content">
    <h1>The Lounge - Find - GLM & INWO</h1>

    <div class="section">
      <h2>FIND GLM</h2>
      <p>Click the pictures below to go straight to the YouTube Channel.</p>
      
      <div class="yt-links">
        <div class="yt-block">
          <a href="https://www.youtube.com/@GLM2026" target="_blank">
            <img src="image-20.jpg" alt="GLM 2026" loading="lazy">
            <br>GLM 2026
          </a>
        </div>
        <div class="yt-block">
          <a href="https://www.youtube.com/@420Flexaronnie" target="_blank">
            <img src="32.jpg" alt="420Flexaronnie" loading="lazy">
            <br>420Flexaronnie
          </a>
        </div>
      </div>
    </div>

    <div class="visitors">VISITORS: 1337</div>

    <div class="section" id="cards-section">
      <h2>ILLUMINATI CARDS</h2>
      <p class="old-school">INWO Card Archive &mdash; Illuminati: New World Order (1994&ndash;1998)</p>

      <div class="cards-panel">
        <div class="cards-toolbar">
          <input type="search" id="card-search" placeholder="Search cards..." aria-label="Search cards" />
          <span id="card-stats">Loading...</span>
        </div>

        <div class="set-tabs" id="set-tabs"></div>

        <div class="cards-filters">
          <label>Type
            <select id="type-filter">
              <option value="">All types</option>
            </select>
          </label>
          <label>Rarity
            <select id="rarity-filter">
              <option value="">All rarities</option>
              <option value="C">Common</option>
              <option value="U">Uncommon</option>
              <option value="R">Rare</option>
              <option value="I">Illuminati</option>
              <option value="S">Special</option>
              <option value="UR">Ultra-Rare</option>
            </select>
          </label>
          <label>
            <input type="checkbox" id="notable-filter" /> Notable only
          </label>
        </div>

        <div id="notable-cards" class="notable-cards"></div>
        <div id="card-grid" class="card-grid">
          <p class="cards-loading">Loading card catalog...</p>
        </div>
      </div>

      <div id="card-detail"></div>
    </div>

    <div class="footer-note">
      &#128405;&#128526;&#128405; &bull; glmontherun.com
    </div>
  </div>

  <script>
    // ===================== MATRIX BACKGROUND =====================
    const matrixCanvas = document.getElementById('matrix-bg');
    const matrixCtx = matrixCanvas.getContext('2d');

    const matrixChars = "01ã‚¢ã‚¤ã‚¦ã‚¨ã‚ªã‚«ã‚­ã‚¯ã‚±ã‚³ã‚µã‚·ã‚¹ã‚»ã‚½ã‚¿ãƒãƒ„ãƒ†ãƒˆãƒŠãƒ‹ãƒŒãƒãƒŽãƒãƒ’ãƒ•ãƒ˜ãƒ›ãƒžãƒŸãƒ ãƒ¡ãƒ¢ãƒ¤ãƒ¦ãƒ¨ãƒ©ãƒªãƒ«ãƒ¬ãƒ­ãƒ¯ãƒ²ãƒ³0123456789";
    const fontSize = 14;
    let columns = 0;
    let drops = [];

    function initMatrix() {
      columns = Math.floor(matrixCanvas.width / fontSize);
      drops = [];
      for (let i = 0; i < columns; i++) {
        drops[i] = Math.random() * -100;
      }
    }

    function resizeMatrix() {
      matrixCanvas.width = Math.max(window.innerWidth, 320);
      matrixCanvas.height = window.innerHeight;
      initMatrix();
    }

    function drawMatrix() {
      matrixCtx.fillStyle = 'rgba(0, 0, 0, 0.03)';
      matrixCtx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);

      matrixCtx.fillStyle = '#00ff41';
      matrixCtx.font = fontSize + 'px monospace';
      matrixCtx.shadowColor = '#00ff41';
      matrixCtx.shadowBlur = 2;

      for (let i = 0; i < drops.length; i++) {
        const text = matrixChars.charAt(Math.floor(Math.random() * matrixChars.length));
        const x = i * fontSize;
        const y = drops[i] * fontSize;

        matrixCtx.fillText(text, x, y);

        if (y > matrixCanvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }

      matrixCtx.shadowBlur = 0;
    }

    function matrixLoop() {
      drawMatrix();
      requestAnimationFrame(matrixLoop);
    }

    let lastResize = 0;
    window.addEventListener('resize', () => {
      const now = Date.now();
      if (now - lastResize > 100) {
        lastResize = now;
        resizeMatrix();
      }
    });

    resizeMatrix();
    matrixLoop();

    setInterval(() => {
      if (Math.random() > 0.7) initMatrix();
    }, 15000);

    // ===================== ILLUMINATI CARDS =====================
    const CARD_DATA_URLS = [
      'data/cards.json',
      'illuminati-archive/dist/data/cards.json'
    ];

    let cardCatalog = null;
    let cardFilters = { query: '', set: '', type: '', rarity: '', notableOnly: false };

    function cardImage(card) {
      if (!card.image) return '';
      return card.image;
    }

    async function loadCardCatalog() {
      let lastError = null;
      for (const url of CARD_DATA_URLS) {
        try {
          const res = await fetch(url);
          if (!res.ok) throw new Error(`${url} returned ${res.status}`);
          return await res.json();
        } catch (err) {
          lastError = err;
        }
      }
      throw lastError || new Error('Card catalog not found');
    }

    function getFilteredCards() {
      if (!cardCatalog) return [];
      const q = cardFilters.query.toLowerCase().trim();
      return cardCatalog.cards.filter((c) => {
        if (cardFilters.set && c.set !== cardFilters.set) return false;
        if (cardFilters.type && c.type !== cardFilters.type) return false;
        if (cardFilters.rarity && c.rarity !== cardFilters.rarity) return false;
        if (cardFilters.notableOnly && !c.notable) return false;
        if (!q) return true;
        const hay = [c.name, c.text, c.type, c.set, c.alignment, ...(c.attributes || [])]
          .filter(Boolean).join(' ').toLowerCase();
        return hay.includes(q);
      });
    }

    function renderSetTabs() {
      const el = document.getElementById('set-tabs');
      const sets = ['', ...cardCatalog.sets];
      el.innerHTML = sets.map((s) => `
        <button class="set-tab ${cardFilters.set === s ? 'active' : ''}" data-set="${s}">
          ${s || 'ALL'}
        </button>
      `).join('');
      el.querySelectorAll('.set-tab').forEach((btn) => {
        btn.addEventListener('click', () => {
          cardFilters.set = cardFilters.set === btn.dataset.set ? '' : btn.dataset.set;
          renderCards();
        });
      });
    }

    function renderNotableCards() {
      const el = document.getElementById('notable-cards');
      const notable = cardCatalog.cards.filter((c) => c.notable);
      el.innerHTML = `
        <h3>NOTABLE CARDS</h3>
        <p class="notable-intro">
          Satirical conspiracy fiction from 1994 &mdash; not prophecy. These cards went viral
          because artwork loosely resembled later events.
        </p>
        <div class="notable-scroll">
          ${notable.map((card) => `
            <article class="notable-card" data-id="${card.id}">
              <img src="${cardImage(card)}" alt="${card.name}" loading="lazy" />
              <div class="notable-card-body">
                <strong>${card.name}</strong>
                <span>${card.headline || 'Notable'}</span>
              </div>
            </article>
          `).join('')}
        </div>
      `;
      el.querySelectorAll('.notable-card').forEach((item) => {
        item.addEventListener('click', () => openCardDetail(item.dataset.id));
      });
    }

    function renderCardGrid() {
      const el = document.getElementById('card-grid');
      const list = getFilteredCards();
      document.getElementById('card-stats').textContent =
        `${list.length} / ${cardCatalog.cards.length} cards`;

      if (!list.length) {
        el.innerHTML = '<p class="cards-loading">No cards match your filters.</p>';
        return;
      }

      el.innerHTML = list.map((card) => `
        <article class="grid-card" data-id="${card.id}">
          ${card.notable ? '<span class="notable-badge">★</span>' : ''}
          <img src="${cardImage(card)}" alt="${card.name}" loading="lazy" />
          <div class="grid-card-info">
            <strong>${card.name}</strong>
            <span>${card.set} · ${card.type}</span>
          </div>
        </article>
      `).join('');

      el.querySelectorAll('.grid-card').forEach((item) => {
        item.addEventListener('click', () => openCardDetail(item.dataset.id));
      });
    }

    function openCardDetail(id) {
      const card = cardCatalog.cards.find((c) => c.id === id);
      if (!card) return;

      const stats = [
        ['Set', card.set],
        ['Type', card.type],
        ['Rarity', card.rarityLabel],
        ['Alignment', card.alignment],
        ['Power', card.power],
        ['Resistance', card.resistance],
      ].filter(([, v]) => v);

      const notableHtml = card.notable ? `
        <div class="notable-context">
          <h3>WHY THIS CARD WENT VIRAL</h3>
          <p><strong>${card.headline || ''}</strong></p>
          <p>${card.context || ''}</p>
        </div>
      ` : '';

      document.getElementById('card-detail').innerHTML = `
        <div class="detail-overlay" role="dialog" aria-label="${card.name}">
          <div class="detail-panel">
            <button class="detail-close" aria-label="Close">&times;</button>
            <div class="detail-image">
              ${card.image ? `<img src="${cardImage(card)}" alt="${card.name}" loading="lazy" />` : ''}
            </div>
            <div class="detail-body">
              <h2>${card.name}</h2>
              <div class="card-badges">
                <span class="card-badge">${card.set}</span>
                <span class="card-badge">${card.type}</span>
                ${card.rarityLabel ? `<span class="card-badge">${card.rarityLabel}</span>` : ''}
                ${card.notable ? '<span class="card-badge">Notable</span>' : ''}
              </div>
              ${stats.length ? stats.map(([k, v]) => `<div><span style="color:#00ffff">${k}:</span> ${v}</div>`).join('') : ''}
              ${card.text ? `<p class="card-text">${card.text}</p>` : ''}
              ${notableHtml}
            </div>
          </div>
        </div>
      `;

      const overlay = document.querySelector('.detail-overlay');
      overlay.querySelector('.detail-close').addEventListener('click', closeCardDetail);
      overlay.addEventListener('click', (e) => { if (e.target === overlay) closeCardDetail(); });
    }

    function closeCardDetail() {
      document.getElementById('card-detail').innerHTML = '';
    }

    function renderCards() {
      renderSetTabs();
      renderNotableCards();
      renderCardGrid();
    }

    function setupCardFilters() {
      document.getElementById('card-search').addEventListener('input', (e) => {
        cardFilters.query = e.target.value;
        renderCardGrid();
      });
      document.getElementById('type-filter').addEventListener('change', (e) => {
        cardFilters.type = e.target.value;
        renderCards();
      });
      document.getElementById('rarity-filter').addEventListener('change', (e) => {
        cardFilters.rarity = e.target.value;
        renderCards();
      });
      document.getElementById('notable-filter').addEventListener('change', (e) => {
        cardFilters.notableOnly = e.target.checked;
        renderCards();
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeCardDetail();
      });
    }

    async function initCards() {
      try {
        cardCatalog = await loadCardCatalog();

        const typeSelect = document.getElementById('type-filter');
        cardCatalog.types.forEach((t) => {
          const opt = document.createElement('option');
          opt.value = t;
          opt.textContent = t;
          typeSelect.appendChild(opt);
        });

        setupCardFilters();
        renderCards();
      } catch (err) {
        document.getElementById('card-grid').innerHTML = `
          <p class="cards-error">
            Could not load cards. Deploy <code>data/cards.json</code> and the <code>cards/</code> folder<br>
            to your site root, then refresh.
          </p>
        `;
        document.getElementById('card-stats').textContent = '0 cards';
      }
    }

    initCards();

    console.log('%c[Mobile-Optimized Matrix + INWO] Lounge ready.', 'color:#00ff9f');
  </script>
</body>
</html>
